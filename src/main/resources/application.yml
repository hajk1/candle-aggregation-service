spring:
  application:
    name: candle-aggregation
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  lifecycle:
    timeout-per-shutdown-phase: 10s  # wait up to 10s for in-flight requests before hard stop
  task:
    scheduling:
      pool:
        size: 4   # flush() and tick() run on separate threads — no mutual blocking

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

candle:
  flush:
    interval-ms: 1000       # how often the flush scheduler runs
    grace-period-seconds: 2  # hold buckets open this long after close to absorb delayed events

simulator:
  enabled: true         # set to false when plugging in a real feed (Kafka, WebSocket, etc.)
  rate-ms: 50           # 20 ticks/second total (~6-7 per symbol) — demonstrates high-frequency ingestion
  symbols: BTC-USD,ETH-USD,SOL-USD

server:
  shutdown: graceful  # drain active HTTP requests before context closes

logging:
  level:
    com.multibank.candle: DEBUG
