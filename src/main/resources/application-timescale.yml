# Activate with: --spring.profiles.active=timescale
# Requires TimescaleDB to be running (see docker-compose.yml)

spring:
  autoconfigure:
    exclude: []   # re-enable DataSource and Flyway autoconfigure

  datasource:
    url: jdbc:postgresql://localhost:5432/candles
    username: candles
    password: candles
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000

  flyway:
    enabled: true
    locations: classpath:db/migration
